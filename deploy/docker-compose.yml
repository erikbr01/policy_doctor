# Two Streamlit apps + an nginx reverse proxy that routes by subdomain.
#
#     Browser  ──►  proxy:80  ──►  survey:8501   (study.<domain>)
#                              \─►  demo:8501    (demo.<domain>)
#
# The survey/demo containers are NOT exposed on the host directly — they're
# only reachable through the proxy.
#
# For production, layer in docker-compose.tunnel.yml to add a Cloudflare
# Tunnel sidecar (outbound-only, no open ports or TLS cert management needed).
#
# Usage:
#   cd deploy/
#   docker compose build              # build the streamlit image
#   docker compose up -d              # start all three services (local/HTTP)
#
#   # With Cloudflare Tunnel (production):
#   docker compose -f docker-compose.yml -f docker-compose.tunnel.yml up -d
#
# Local testing without DNS:
#   Default STUDY_DOMAIN/DEMO_DOMAIN are study.localhost / demo.localhost.
#   On most Linux + macOS systems these already resolve to 127.0.0.1.
#   If not, add to /etc/hosts:
#     127.0.0.1  study.localhost demo.localhost
#   Or use the public wildcard service:
#     STUDY_DOMAIN=study.lvh.me  DEMO_DOMAIN=demo.lvh.me

services:
  survey:
    image: policy-doctor-demo
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "8501"
    environment:
      APP_PASSWORD_SHA256: "${SURVEY_PASSWORD_SHA256:-}"
    volumes:
      - "${SURVEY_RESPONSES_DIR:-./survey_responses}:/app/survey_responses"
    command: >
      streamlit run /app/policy_doctor/streamlit_app/survey_app/Home.py
      --server.port 8501
      --server.address 0.0.0.0
      --server.headless true

  demo:
    image: policy-doctor-demo
    # Reuses the image built by the survey service — no separate build step.
    restart: unless-stopped
    expose:
      - "8501"
    environment:
      APP_PASSWORD_SHA256: "${APP_PASSWORD_SHA256:-}"
    volumes:
      - "${SURVEY_RESPONSES_DIR:-./survey_responses}:/app/survey_responses"
    command: >
      streamlit run /app/policy_doctor/streamlit_app/demo_app/Home.py
      --server.port 8501
      --server.address 0.0.0.0
      --server.headless true
    depends_on:
      - survey

  proxy:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    environment:
      STUDY_DOMAIN: "${STUDY_DOMAIN:-study.localhost}"
      DEMO_DOMAIN: "${DEMO_DOMAIN:-demo.localhost}"
      # Limit envsubst to our two vars — leaves nginx's own $vars intact.
      NGINX_ENVSUBST_FILTER: "^(STUDY|DEMO)_DOMAIN$$"
    volumes:
      - ./nginx/templates:/etc/nginx/templates:ro
    depends_on:
      - survey
      - demo

# No named volumes — responses use a bind mount so the path is explicit and
# survives docker compose down.  Set SURVEY_RESPONSES_DIR in .env to point at
# the persistent disk mount on the VM (/mnt/data/survey_responses).
# Default (./survey_responses) is suitable for local testing.
