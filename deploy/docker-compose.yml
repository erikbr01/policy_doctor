# Run both the survey app and the graph-demo app from the same Docker image.
#
# Usage:
#   cd deploy/
#   docker build -t policy-doctor-demo .
#   docker compose up -d
#
# Ports:
#   8501 → survey app   (send this URL to study participants)
#   8502 → graph demo   (researchers / analytics, includes Survey Analytics page)
#
# Environment:
#   APP_PASSWORD_SHA256     password hash for the graph-demo app (omit = open)
#   SURVEY_PASSWORD_SHA256  password hash for the survey app    (omit = open)
#   SURVEY_GCS_BUCKET       GCS bucket name for response storage (omit = local)
#
# GCP credentials:
#   Mount ~/.config/gcloud or set GOOGLE_APPLICATION_CREDENTIALS to a key file.
#   The volume below works for Application Default Credentials on a GCP VM or
#   a dev machine with `gcloud auth application-default login`.

services:
  survey:
    image: policy-doctor-demo
    restart: unless-stopped
    ports:
      - "8501:8501"
    environment:
      APP_PASSWORD_SHA256: "${SURVEY_PASSWORD_SHA256:-}"
      SURVEY_GCS_BUCKET: "${SURVEY_GCS_BUCKET:-}"
    volumes:
      - "${GOOGLE_APPLICATION_CREDENTIALS:-/dev/null}:/gcp-key.json:ro"
      - survey_responses:/app/survey_responses
    command: >
      streamlit run /app/policy_doctor/streamlit_app/survey_app/Home.py
      --server.port 8501
      --server.address 0.0.0.0
      --server.headless true

  demo:
    image: policy-doctor-demo
    restart: unless-stopped
    ports:
      - "8502:8501"
    environment:
      APP_PASSWORD_SHA256: "${APP_PASSWORD_SHA256:-}"
      SURVEY_GCS_BUCKET: "${SURVEY_GCS_BUCKET:-}"
    volumes:
      - "${GOOGLE_APPLICATION_CREDENTIALS:-/dev/null}:/gcp-key.json:ro"
      - survey_responses:/app/survey_responses
    command: >
      streamlit run /app/policy_doctor/streamlit_app/demo_app/Home.py
      --server.port 8501
      --server.address 0.0.0.0
      --server.headless true

volumes:
  survey_responses:
