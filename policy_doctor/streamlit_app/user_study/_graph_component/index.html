<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: transparent; font-family: -apple-system, BlinkMacSystemFont, sans-serif; overflow: hidden; }
  html, svg { background: transparent; }
  svg { display: block; width: 100%; height: 100%; cursor: default; }

  .node-circle {
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    transform-origin: center;
  }
  .node-circle:hover { opacity: 0.85; filter: brightness(1.1); }
  .node-circle.selected { stroke: #1a1a1a; stroke-width: 3px; }

  .node-label {
    pointer-events: none;
    font-size: 10px;
    fill: #ccc;
    font-weight: 400;
    text-anchor: middle;
    dominant-baseline: auto;
    user-select: none;
  }

  .edge { pointer-events: none; }

  #tooltip {
    position: fixed;
    background: rgba(0,0,0,0.82);
    color: #fff;
    padding: 8px 12px;
    border-radius: 6px;
    font-size: 12px;
    line-height: 1.5;
    pointer-events: none;
    display: none;
    z-index: 999;
    max-width: 260px;
    white-space: pre-line;
  }
  .tt-thumbs {
    display: flex;
    gap: 4px;
    margin-bottom: 6px;
  }
  .tt-thumbs img {
    width: 72px;
    height: 72px;
    border-radius: 3px;
    object-fit: cover;
    flex-shrink: 0;
  }

  #instructions {
    position: absolute;
    bottom: 8px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    color: #666;
    pointer-events: none;
    white-space: nowrap;
  }
  #reset-btn {
    position: absolute;
    top: 8px;
    right: 8px;
    z-index: 5;
    background: rgba(40, 40, 40, 0.85);
    color: #ddd;
    border: 1px solid #555;
    padding: 4px 10px;
    border-radius: 4px;
    font-size: 11px;
    cursor: pointer;
    user-select: none;
    display: none;  /* shown only after a manual drag */
  }
  #reset-btn:hover { background: rgba(70, 70, 70, 0.95); }
</style>
</head>
<body>

<div id="tooltip"></div>
<button id="reset-btn" title="Restore the computed layout">↺ Reset positions</button>
<svg id="graph"></svg>
<div id="instructions">Drag any node to move it · Click to explore</div>

<script>
// ── Streamlit messaging ───────────────────────────────────────────────────
const STREAMLIT_ORIGIN = window.parent !== window ? "*" : null;

function sendReady() {
  window.parent.postMessage({ isStreamlitMessage: true, type: "streamlit:componentReady", apiVersion: 1 }, "*");
}

function sendValue(value) {
  window.parent.postMessage({
    isStreamlitMessage: true,
    type: "streamlit:setComponentValue",
    value: value,
    dataType: "json",
  }, "*");
}

function setHeight(h) {
  window.parent.postMessage({ isStreamlitMessage: true, type: "streamlit:setFrameHeight", height: h }, "*");
}

// ── Graph state ───────────────────────────────────────────────────────────
let graphData = null;
let selectedNodeId = null;
let selectedEdge = null;   // {src, tgt} when an edge is selected
let clickSeq = 0;          // bumps per user click so repeats are distinct
                           // even when the payload (node id) is the same
let highlightedPath = null; // array of node IDs forming the highlighted path
let pixPosMut = {};         // mutable pixel positions (live, including user drags)
let initialPixPos = {};     // snapshot from the most recent layout (for reset)
let userOverrides = {};     // nodes the user has manually moved; cleared on reset
let dragging = null;        // {nodeId, startMouse, startNode, moved}
let lastRenderArgs = null;  // svgW, svgH for re-render on reset

// ── Layout helpers ────────────────────────────────────────────────────────
function toSvgCoords(pos, svgW, svgH, padding) {
  // pos is {nodeId: [x, y]} in data space; map to SVG pixel space
  const xs = Object.values(pos).map(p => p[0]);
  const ys = Object.values(pos).map(p => p[1]);
  const minX = Math.min(...xs), maxX = Math.max(...xs);
  const minY = Math.min(...ys), maxY = Math.max(...ys);
  const rangeX = maxX - minX || 1;
  const rangeY = maxY - minY || 1;
  const result = {};
  for (const [id, [x, y]] of Object.entries(pos)) {
    result[id] = [
      padding + ((x - minX) / rangeX) * (svgW - 2 * padding),
      padding + ((y - minY) / rangeY) * (svgH - 2 * padding),
    ];
  }
  return result;
}

// ── Rendering ─────────────────────────────────────────────────────────────
// Compute the SVG path `d` attribute and arrowhead-direction vector for an
// edge between two pixel positions. Curvature scales with chord length so
// short hops are nearly straight, long hops arc clearly.
function edgePathD(x0, y0, x1, y1, side) {
  const chord = Math.sqrt((x1 - x0)**2 + (y1 - y0)**2) || 1;
  const pcx = -(y1 - y0) / chord;
  const pcy =  (x1 - x0) / chord;
  const curve = Math.min(60, Math.max(0, (chord - 80) * 0.18));
  const arc = (side !== undefined) ? side : ((x1 >= x0) ? -1 : 1);
  const cx = (x0 + x1) / 2 + pcx * curve * arc;
  const cy = (y0 + y1) / 2 + pcy * curve * arc;
  return `M ${x0} ${y0} Q ${cx} ${cy} ${x1} ${y1}`;
}

// Recompute the path for every edge touching nodeId and update DOM.
function redrawEdgesFor(nodeId) {
  if (!graphData) return;
  const svg = document.getElementById("graph");
  const maxEpisodes = Math.max(...graphData.nodes.map(n => n.num_episodes), 1);
  for (const edge of graphData.edges) {
    if (edge.src !== nodeId && edge.tgt !== nodeId) continue;
    const [x0, y0] = pixPosMut[edge.src] || [0, 0];
    const [x1, y1] = pixPosMut[edge.tgt] || [0, 0];
    const rSrc = nodeRadius(graphData.nodes.find(n => n.id === edge.src), maxEpisodes);
    const rTgt = nodeRadius(graphData.nodes.find(n => n.id === edge.tgt), maxEpisodes);
    const dx = x1 - x0, dy = y1 - y0;
    const len = Math.sqrt(dx*dx + dy*dy) || 1;
    const ux = dx / len, uy = dy / len;
    const sx = x0 + ux * (rSrc + 2), sy = y0 + uy * (rSrc + 2);
    const ex = x1 - ux * (rTgt + 6), ey = y1 - uy * (rTgt + 6);
    let ox = 0, oy = 0;
    if (graphData.edges.some(e => e.src === edge.tgt && e.tgt === edge.src)) {
      ox = -uy * 5; oy = ux * 5;
    }
    const d = edgePathD(sx + ox, sy + oy, ex + ox, ey + oy);
    // Update both visible and hit-area paths
    const sel = `[data-src="${edge.src}"][data-tgt="${edge.tgt}"]`;
    svg.querySelectorAll(`path${sel}`).forEach(p => p.setAttribute("d", d));
  }
}

function render(data, svgW, svgH) {
  graphData = data;
  lastRenderArgs = { svgW, svgH };
  const svg = document.getElementById("graph");
  svg.setAttribute("viewBox", `0 0 ${svgW} ${svgH}`);
  svg.innerHTML = "";

  const padding = 60;
  // Compute fresh positions from data, then overlay any user drags.
  const freshPos = toSvgCoords(data.positions, svgW, svgH, padding);
  initialPixPos = JSON.parse(JSON.stringify(freshPos));
  pixPosMut = {};
  for (const id of Object.keys(freshPos)) {
    pixPosMut[id] = userOverrides[id] ? [...userOverrides[id]] : [...freshPos[id]];
  }
  const pixPos = pixPosMut;  // alias for the rest of this function

  const maxEpisodes = Math.max(...data.nodes.map(n => n.num_episodes), 1);

  // ── defs: arrowhead marker ─────────────────────────────────────────────
  const pathSet = highlightedPath ? new Set(highlightedPath.map(String)) : null;
  const hasPath = pathSet && pathSet.size > 0;

  const defs = svgEl("defs");
  const marker = svgEl("marker", { id: "arrow", markerWidth: "6", markerHeight: "6",
    refX: "5", refY: "3", orient: "auto" });
  marker.appendChild(svgEl("polygon", { points: "0 0, 6 3, 0 6", fill: "rgba(180,180,180,0.7)" }));
  defs.appendChild(marker);
  const markerHL = svgEl("marker", { id: "arrow-hl", markerWidth: "7", markerHeight: "7",
    refX: "5", refY: "3.5", orient: "auto" });
  markerHL.appendChild(svgEl("polygon", { points: "0 0, 7 3.5, 0 7", fill: "#f5a623" }));
  defs.appendChild(markerHL);
  // Selected-node edge arrowhead (cyan)
  const markerSel = svgEl("marker", { id: "arrow-sel", markerWidth: "7", markerHeight: "7",
    refX: "5", refY: "3.5", orient: "auto" });
  markerSel.appendChild(svgEl("polygon", { points: "0 0, 7 3.5, 0 7", fill: "#64c8ff" }));
  defs.appendChild(markerSel);
  // Selected-edge arrowhead (gold)
  const markerEdgeSel = svgEl("marker", { id: "arrow-edge-sel", markerWidth: "7", markerHeight: "7",
    refX: "5", refY: "3.5", orient: "auto" });
  markerEdgeSel.appendChild(svgEl("polygon", { points: "0 0, 7 3.5, 0 7", fill: "#ffc832" }));
  defs.appendChild(markerEdgeSel);
  svg.appendChild(defs);

  const hasSelected = selectedNodeId !== null && !hasPath;
  const hasSelectedEdge = selectedEdge !== null && !hasPath && selectedNodeId === null;

  // ── edges ─────────────────────────────────────────────────────────────
  const edgeGroup = svgEl("g", { class: "edges" });
  for (const edge of data.edges) {
    const [x0, y0] = pixPos[edge.src] || [0, 0];
    const [x1, y1] = pixPos[edge.tgt] || [0, 0];
    if (!pixPos[edge.src] || !pixPos[edge.tgt]) continue;

    const rSrc = nodeRadius(data.nodes.find(n => n.id === edge.src), maxEpisodes);
    const rTgt = nodeRadius(data.nodes.find(n => n.id === edge.tgt), maxEpisodes);
    const dx = x1 - x0, dy = y1 - y0;
    const len = Math.sqrt(dx*dx + dy*dy) || 1;
    const ux = dx/len, uy = dy/len;
    const sx = x0 + ux * (rSrc + 2), sy = y0 + uy * (rSrc + 2);
    const ex = x1 - ux * (rTgt + 6), ey = y1 - uy * (rTgt + 6);

    let ox = 0, oy = 0;
    if (data.edges.some(e => e.src === edge.tgt && e.tgt === edge.src)) {
      ox = -uy * 5; oy = ux * 5;
    }

    const onPath = hasPath &&
      pathSet.has(String(edge.src)) && pathSet.has(String(edge.tgt)) &&
      highlightedPath.indexOf(edge.src) < highlightedPath.indexOf(edge.tgt);

    const isOutgoing = hasSelected && edge.src === selectedNodeId;
    const isIncoming = hasSelected && edge.tgt === selectedNodeId;
    const isEdgeSel = hasSelectedEdge && edge.src === selectedEdge.src && edge.tgt === selectedEdge.tgt;

    let stroke, strokeW, markerEnd;
    if (onPath) {
      stroke = "rgba(245,166,35,0.95)";
      strokeW = (1.5 + edge.prob * 5).toFixed(1);
      markerEnd = "url(#arrow-hl)";
    } else if (hasPath) {
      stroke = `rgba(120,120,120,${(0.1 + edge.prob * 0.15).toFixed(2)})`;
      strokeW = (0.5 + edge.prob * 2).toFixed(1);
      markerEnd = "url(#arrow)";
    } else if (isEdgeSel) {
      stroke = "rgba(255,200,50,0.97)";
      strokeW = "3.5";
      markerEnd = "url(#arrow-edge-sel)";
    } else if (hasSelectedEdge) {
      stroke = `rgba(80,80,80,${(0.05 + edge.prob * 0.06).toFixed(2)})`;
      strokeW = (0.4 + edge.prob * 1.5).toFixed(1);
      markerEnd = "url(#arrow)";
    } else if (isOutgoing) {
      stroke = `rgba(100,200,255,${(0.75 + edge.prob * 0.25).toFixed(2)})`;
      strokeW = (1.8 + edge.prob * 4).toFixed(1);
      markerEnd = "url(#arrow-sel)";
    } else if (isIncoming) {
      stroke = `rgba(100,200,255,${(0.45 + edge.prob * 0.25).toFixed(2)})`;
      strokeW = (1.0 + edge.prob * 3).toFixed(1);
      markerEnd = "url(#arrow-sel)";
    } else if (hasSelected) {
      stroke = `rgba(100,100,100,${(0.06 + edge.prob * 0.08).toFixed(2)})`;
      strokeW = (0.4 + edge.prob * 1.5).toFixed(1);
      markerEnd = "url(#arrow)";
    } else {
      stroke = `rgba(180,180,180,${(0.25 + edge.prob * 0.55).toFixed(2)})`;
      strokeW = (0.8 + edge.prob * 4).toFixed(1);
      markerEnd = "url(#arrow)";
    }

    // Build a path. Short edges → straight line. Long edges → quadratic
    // Bezier whose control point sits perpendicular to the chord.
    const x0p = sx + ox, y0p = sy + oy, x1p = ex + ox, y1p = ey + oy;
    const d = edgePathD(x0p, y0p, x1p, y1p);

    const line = svgEl("path", {
      class: "edge",
      d,
      fill: "none",
      stroke, "stroke-width": strokeW,
      "marker-end": markerEnd,
      "data-src": String(edge.src),
      "data-tgt": String(edge.tgt),
    });
    edgeGroup.appendChild(line);

    // Transparent wider hit-area path so edges are easy to click
    const hit = svgEl("path", {
      d,
      fill: "none",
      stroke: "transparent", "stroke-width": "12",
      "pointer-events": "stroke", cursor: "pointer",
      "data-src": String(edge.src),
      "data-tgt": String(edge.tgt),
    });
    (function(e) {
      hit.addEventListener("click", function(evt) {
        evt.stopPropagation();
        if (selectedEdge && selectedEdge.src === e.src && selectedEdge.tgt === e.tgt) {
          selectedEdge = null;
          sendValue([-1, ++clickSeq]);
        } else {
          selectedEdge = {src: e.src, tgt: e.tgt};
          selectedNodeId = null;
          sendValue([e.src, e.tgt, ++clickSeq]);
        }
        render(graphData, svgW, svgH);
      });
    })(edge);
    edgeGroup.appendChild(hit);
  }
  svg.appendChild(edgeGroup);

  // ── nodes ─────────────────────────────────────────────────────────────
  const nodeGroup = svgEl("g", { class: "nodes" });
  for (const node of data.nodes) {
    const [cx, cy] = pixPos[node.id] || [0, 0];
    const r = nodeRadius(node, maxEpisodes);
    const g = svgEl("g", {
      class: "node-group",
      transform: `translate(${cx},${cy})`,
      "data-node-id": String(node.id),
    });

    // Selection halo: a translucent ring rendered behind the node so the
    // node keeps its normal white stroke when selected (no jarring restyle).
    if (node.id === selectedNodeId) {
      const haloR = r + 8;
      const halo = svgEl("circle", {
        r: haloR,
        fill: "none",
        stroke: "rgba(80, 200, 255, 0.95)",
        "stroke-width": "3",
        "pointer-events": "none",
      });
      g.appendChild(halo);
    }

    // Main circle/shape
    let shape;
    if (node.symbol === "diamond") {
      const s = r * 1.3;
      shape = svgEl("polygon", {
        points: `0,${-s} ${s},0 0,${s} ${-s},0`,
        fill: node.color,
        stroke: "white",
        "stroke-width": "2",
        class: "node-circle" + (node.id === selectedNodeId ? " selected" : ""),
      });
    } else if (node.symbol === "star") {
      shape = svgEl("text", {
        "text-anchor": "middle",
        "dominant-baseline": "central",
        "font-size": r * 2.2,
        "user-select": "none",
        class: "node-circle" + (node.id === selectedNodeId ? " selected" : ""),
      });
      shape.textContent = "★";
      shape.style.fill = node.color;
    } else if (node.symbol === "x") {
      shape = svgEl("text", {
        "text-anchor": "middle",
        "dominant-baseline": "central",
        "font-size": r * 2.4,
        "user-select": "none",
        "font-weight": "bold",
        class: "node-circle" + (node.id === selectedNodeId ? " selected" : ""),
      });
      shape.textContent = "✕";
      shape.style.fill = node.color;
    } else {
      // Always keep the standard white outline; selection is conveyed by
      // the cyan halo ring rendered above (behind the node).
      shape = svgEl("circle", {
        r: r,
        fill: node.color,
        stroke: "white",
        "stroke-width": "2",
        class: "node-circle",
      });
    }

    // Dim nodes not on highlighted path / not incident to selected edge / not connected to selected node
    if (hasPath && !pathSet.has(String(node.id))) {
      g.setAttribute("opacity", "0.25");
    } else if (hasSelectedEdge && node.id !== selectedEdge.src && node.id !== selectedEdge.tgt) {
      g.setAttribute("opacity", "0.25");
    } else if (hasSelected && node.id !== selectedNodeId) {
      const connected = data.edges.some(e =>
        (e.src === selectedNodeId && e.tgt === node.id) ||
        (e.tgt === selectedNodeId && e.src === node.id)
      );
      if (!connected) g.setAttribute("opacity", "0.3");
    }

    // Invisible hit-area circle (larger, for easier clicking)
    const hit = svgEl("circle", { r: Math.max(r + 8, 18), fill: "transparent", class: "node-circle", cursor: "pointer" });

    g.appendChild(shape);
    g.appendChild(hit);

    // Label
    const label = svgEl("text", {
      class: "node-label",
      x: 0,
      y: r + 13,
    });
    label.textContent = node.label;
    g.appendChild(label);

    // Click + tooltip
    const tooltip = document.getElementById("tooltip");
    g.addEventListener("mouseenter", (e) => {
      tooltip.style.display = "block";
      // Build inner HTML: optional thumbnail row + text stats
      let html = "";
      if (node.thumbnails && node.thumbnails.length > 0) {
        html += '<div class="tt-thumbs">';
        for (const src of node.thumbnails) {
          // Only allow data URIs that start with our known prefix
          if (src.startsWith("data:image/jpeg;base64,")) {
            html += `<img src="${src}">`;
          }
        }
        html += "</div>";
      }
      // Escape text content to prevent XSS (tooltip text is our own JSON, but be safe)
      const textDiv = document.createElement("div");
      textDiv.textContent = node.tooltip;
      html += textDiv.outerHTML;
      tooltip.innerHTML = html;
      positionTooltip(e);
    });
    g.addEventListener("mousemove", positionTooltip);
    g.addEventListener("mouseleave", () => { tooltip.style.display = "none"; });

    // ── Drag: mousedown captures the node; mousemove updates pos; mouseup
    // either fires the click (if no movement) or just ends the drag.
    g.style.cursor = "grab";
    g.addEventListener("mousedown", (evt) => {
      evt.preventDefault();
      const pt = svgPoint(evt);
      dragging = {
        nodeId: node.id,
        startMouse: { x: pt.x, y: pt.y },
        startNode: [...pixPosMut[node.id]],
        moved: false,
      };
      g.style.cursor = "grabbing";
      // Hide tooltip while dragging
      document.getElementById("tooltip").style.display = "none";
    });
    g.addEventListener("click", (evt) => {
      // The mouseup handler clears `dragging` and sets dragMovedRecently
      // if the drag actually moved. If so, suppress this click.
      if (dragMovedRecently) {
        dragMovedRecently = false;
        return;
      }
      if (selectedNodeId === node.id) {
        selectedNodeId = null;
        sendValue([-1, ++clickSeq]);
      } else {
        selectedNodeId = node.id;
        selectedEdge = null; // clear edge selection
        sendValue([node.id, ++clickSeq]);
      }
      render(graphData, svgW, svgH);
    });

    nodeGroup.appendChild(g);
  }
  svg.appendChild(nodeGroup);
}

function nodeRadius(node, maxEpisodes) {
  if (!node || node.is_special) return 12;
  return Math.round(10 + 16 * Math.sqrt(node.num_episodes / maxEpisodes));
}

function svgEl(tag, attrs = {}) {
  const el = document.createElementNS("http://www.w3.org/2000/svg", tag);
  for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, v);
  return el;
}

function positionTooltip(e) {
  const tt = document.getElementById("tooltip");
  const x = e.clientX + 14, y = e.clientY - 10;
  const right = x + tt.offsetWidth > window.innerWidth;
  tt.style.left = (right ? e.clientX - tt.offsetWidth - 10 : x) + "px";
  tt.style.top = Math.max(0, y) + "px";
}

// ── Drag plumbing ─────────────────────────────────────────────────────────
let dragMovedRecently = false;
function svgPoint(evt) {
  const svg = document.getElementById("graph");
  const pt = svg.createSVGPoint();
  pt.x = evt.clientX;
  pt.y = evt.clientY;
  const ctm = svg.getScreenCTM();
  return ctm ? pt.matrixTransform(ctm.inverse()) : { x: evt.clientX, y: evt.clientY };
}

window.addEventListener("mousemove", (evt) => {
  if (!dragging) return;
  const pt = svgPoint(evt);
  const dx = pt.x - dragging.startMouse.x;
  const dy = pt.y - dragging.startMouse.y;
  if (Math.abs(dx) > 2 || Math.abs(dy) > 2) dragging.moved = true;
  const nx = dragging.startNode[0] + dx;
  const ny = dragging.startNode[1] + dy;
  pixPosMut[dragging.nodeId] = [nx, ny];
  const svg = document.getElementById("graph");
  const ng = svg.querySelector(`.node-group[data-node-id="${dragging.nodeId}"]`);
  if (ng) ng.setAttribute("transform", `translate(${nx},${ny})`);
  redrawEdgesFor(dragging.nodeId);
});

window.addEventListener("mouseup", (evt) => {
  if (!dragging) return;
  if (dragging.moved) {
    userOverrides[dragging.nodeId] = [...pixPosMut[dragging.nodeId]];
    dragMovedRecently = true;
    document.getElementById("reset-btn").style.display = "inline-block";
  }
  const svg = document.getElementById("graph");
  const ng = svg.querySelector(`.node-group[data-node-id="${dragging.nodeId}"]`);
  if (ng) ng.style.cursor = "grab";
  dragging = null;
});

document.getElementById("reset-btn").addEventListener("click", (evt) => {
  evt.stopPropagation();
  userOverrides = {};
  document.getElementById("reset-btn").style.display = "none";
  if (graphData && lastRenderArgs) {
    render(graphData, lastRenderArgs.svgW, lastRenderArgs.svgH);
  }
});

// ── Message handling ───────────────────────────────────────────────────────
window.addEventListener("message", (event) => {
  const msg = event.data;
  if (!msg || !msg.type) return;

  if (msg.type === "streamlit:render") {
    const args = msg.args || {};
    const graphJson = args.graph_json;
    const height = args.height || 600;
    selectedNodeId = args.selected_node_id !== undefined ? args.selected_node_id : null;
    selectedEdge = args.selected_edge ? {src: args.selected_edge[0], tgt: args.selected_edge[1]} : null;
    highlightedPath = args.highlighted_path || null;  // list of node IDs

    document.body.style.height = height + "px";
    document.getElementById("graph").style.height = height + "px";
    setHeight(height);

    if (graphJson) {
      render(JSON.parse(graphJson), document.getElementById("graph").clientWidth || 700, height);
    }
  }
});

// Signal ready
sendReady();
</script>
</body>
</html>
