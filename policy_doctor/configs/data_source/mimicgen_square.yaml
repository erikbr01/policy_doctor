# @package _global_
# MimicGen-merged square HDF5 → MimicgenReplayLowdimDataset + MimicgenLowdimRunner, square-shaped obs.
# All simulation (eval, datagen) runs in mimicgen_torch2 env for consistent model XML compatibility.

defaults:
  - /robomimic/baseline/low_dim@baseline: square_mh_mimicgen
  - /robomimic/curation_filtering/low_dim@curation_filtering: square_mh_mimicgen
  - /robomimic/curation_selection/low_dim@curation_selection: square_mh_mimicgen
  - /robomimic/attribution/low_dim@attribution: square_mh_mimicgen
  - /robomimic/evaluation/low_dim@evaluation: square_mh_mimicgen

env: robomimic
state: low_dim
task: square_mh_mimicgen
task_config: square_mh_feb15

data_source:
  id: mimicgen_square
  label: MimicGen square (merged HDF5) + cupid diffusion
  policy_stack: diffusion_unet_lowdim
  attribution_stack: trak_infembed
  visualization: artifact_agnostic
  conda_env_train: mimicgen_torch2
  conda_env_datagen: mimicgen_torch2
  robocasa_submodule: false
  mimicgen_submodule: true

# ---------------------------------------------------------------------------
# MimicGen generation — task-specific parameters for Square D1
# These are merged into mimicgen_datagen at load time; experiment YAMLs
# override only the task-agnostic knobs (success_budget, num_seeds, etc.)
# ---------------------------------------------------------------------------
mimicgen_datagen:
  original_dataset_path: data/mimicgen/square_d1_60.hdf5  # relative to PROJECT_ROOT
  task_name: square
  env_interface_name: MG_Square
  env_interface_type: robosuite

  # Square D1 generation parameters — full D1 randomization
  action_noise: 0.05
  subtask_term_offset_range: [10, 20]
  nn_k: 3
  interpolate_from_last_target_pose: true
  transform_first_robot_pose: false
  num_interpolation_steps: 5
  num_fixed_steps: 0
  fix_initial_object_poses: false
  object_pose_ranges: null

# Attribution source dataset (used by train_attribution and finalize_attribution steps)
attribution:
  dataset_path: data/source/mimicgen/core_datasets/square/demo_src_square_task_D1/demo.hdf5
