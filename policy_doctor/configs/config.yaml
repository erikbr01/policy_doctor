# Policy Doctor pipeline - primary Hydra config.
#
# Usage:
#   python -m policy_doctor.scripts.run_pipeline steps=[run_clustering,run_curation_config,train_curated]
#   python -m policy_doctor.scripts.run_pipeline +experiment=trak_filtering_mar13_p96 steps=[train_curated,eval_curated]
#   python -m policy_doctor.scripts.run_pipeline +experiment=trak_filtering_mar13_p96 train_date=mar16 run_name=myrun

defaults:
  - _self_                                                 # base defaults (lowest priority — experiment overrides these)
  - pipeline/config                                        # base pipeline / clustering / curation params
  - vlm/defaults                                           # VLM slice annotation (optional step)
  # Data profile: cupid RoboMimic | MimicGen square | RoboCasa robomimic-layout (see configs/data_source/*.yaml)
  - data_source: cupid_robomimic
  # MimicGen task profile: task-specific generation settings (see configs/mimicgen/*.yaml)
  # Override with mimicgen=square_d0 etc. — use null when not running mimicgen generation.
  - mimicgen: null
  - experiment: null                                       # experiment config (highest priority — use experiment=name)

# Pipeline identity — override per experiment or on CLI
env: robomimic
state: low_dim
task: transport_mh

# Steps to run ([] = run full ordered sequence; override with steps=[a,b] on CLI or in experiment)
steps: []

dry_run: false
skip_if_done: true   # skip steps whose "done" sentinel already exists (resume support)

# Run folder — results and done-sentinels are written here for resumability.
# run_name is auto-generated as a timestamp if not set.
# run_dir defaults to data/pipeline_runs/<run_name> relative to repo root.
run_name: null
run_dir: null
repo_root: null   # auto-detected from package location if null

# Common training overrides (null = use default from baseline config)
train_date: null
eval_date: null
device: null
seeds: null
run_tag: null
curation_config_path: null
num_epochs: null
project: cupid
