task: transport_mh_jan28
title: "Transport Task: Data Collection Strategy Study"
description: |
  In this study, you will design a data collection strategy for a robot arm learning to
  transport objects. You can view rollout videos from the base policy and optionally
  explore a behavior graph showing how the policy's behavior clusters into distinct modes.
  Your goal is to allocate a data collection budget across different collection strategies
  to improve the policy's performance.

budget:
  total_demos: 500
  min_per_strategy: 0
  allocation_step: 25   # slider granularity

# Path to pre-rendered MP4 videos index (set at runtime or override)
mp4_index: null   # filled in by load_study_config(); can override here

# Strategies available to participants
strategies:
  - id: "s_diverse"
    name: "Diverse Collection"
    short: "Diverse"
    description: |
      Collect demonstrations with varied initial conditions, grasping approaches,
      and transport paths. This mirrors the base dataset distribution.
    trajectory_constraint: null
    initial_condition: "varied"
    graph_nodes: []   # cluster node IDs associated with this strategy (filled in post-analysis)
    color: "#4878d0"
    # example_demos: optional — shows 3 demo clips in the strategy allocator.
    # behavior_label / initial_condition_label become colored tags above the videos.
    # video_paths are relative to the session's demo_videos_dir (default: <mp4_dir>/demo_videos/).
    # example_demos:
    #   behavior_label: "Various approaches"
    #   initial_condition_label: "Varied start"
    #   video_paths:
    #     - ep001.mp4
    #     - ep042.mp4
    #     - ep087.mp4

  - id: "s_left_grasp"
    name: "Left-Side Grasp"
    short: "Left Grasp"
    description: |
      Approach and grasp the object consistently from the left side of the workspace.
      Useful if the policy struggles with right-approach trajectories.
    trajectory_constraint: "approach_left"
    initial_condition: "standard"
    graph_nodes: []
    color: "#ee854a"

  - id: "s_right_grasp"
    name: "Right-Side Grasp"
    short: "Right Grasp"
    description: |
      Approach and grasp the object from the right side of the workspace.
    trajectory_constraint: "approach_right"
    initial_condition: "standard"
    graph_nodes: []
    color: "#6acc65"

  - id: "s_overhead"
    name: "Overhead Grasp"
    short: "Overhead"
    description: |
      Grasp the object from directly above (top-down approach). Often more robust
      to object position variation but requires precise vertical alignment.
    trajectory_constraint: "approach_overhead"
    initial_condition: "standard"
    graph_nodes: []
    color: "#d65f5f"

  - id: "s_constrained_start"
    name: "Constrained Initial Position"
    short: "Fixed Start"
    description: |
      Focus on demonstrations where the object starts in positions that the base
      policy most frequently fails at. Narrows initial condition distribution.
    trajectory_constraint: null
    initial_condition: "failure_correlated"
    graph_nodes: []
    color: "#956cb4"

  - id: "s_recovery"
    name: "Recovery Behaviors"
    short: "Recovery"
    description: |
      Collect demonstrations that explicitly demonstrate recovery from near-failure
      states: dropping, misaligned grasps, or partial placements.
    trajectory_constraint: "recovery"
    initial_condition: "near_failure"
    graph_nodes: []
    color: "#8c613c"
