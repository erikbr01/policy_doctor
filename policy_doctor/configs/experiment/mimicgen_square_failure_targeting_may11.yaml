# @package _global_
# MimicGen failure-targeting experiment — Square D1, May 11 2026.
#
# This is the May-10 experiment re-aimed at:
#   - 100-demo baseline (data/mimicgen/square_d1_100.hdf5)
#   - fresh train_date=may11, eval_date=may11
#
# Run end-to-end:
#   python -m policy_doctor.scripts.run_pipeline \
#     data_source=mimicgen_square \
#     experiment=mimicgen_square_failure_targeting_may11

task_config: square_mh_may11_mimicgen_pipeline
experiment_name: mimicgen_square_failure_targeting_may11
seeds: [0]
reference_seed: 0

train_date: may11
device: cuda:0
project: mimicgen_square
wandb_tags: [square, mimicgen, failure_targeting, may11]

baseline:
  max_train_episodes: 100
  # compile + tf32 on (this is the canonical fast path; torch 2.6→2.8 upgrade and
  # torchvision 0.21→0.23 bump in mimicgen_torch2 resolved the prior AttrsDescriptor
  # incompatibility we hit before).
  compile: true

evaluation:
  train_date: may11
  eval_date: may11
  overwrite: true
  num_episodes: 500

attribution:
  train_date: may11
  eval_date: may11
  dataset_path: data/source/mimicgen/core_datasets/square/demo_src_square_task_D1/demo.hdf5

clustering_influence_source: infembed
clustering_level: rollout
clustering_demo_split: train
clustering_window_width: 5
clustering_stride: 2
clustering_umap_n_components: 100
clustering_n_clusters: 15
clustering_normalize: none
clustering_aggregation: sum

# ---------------------------------------------------------------------------
# MimicGen generation — shared baseline params
# ---------------------------------------------------------------------------
mimicgen_datagen:
  success_budget: 200
  num_seeds: 20              # matches failure-targeting total (5 clusters × 4 per cluster)
  original_dataset_path: data/mimicgen/square_d1_100.hdf5
  output_dir: data/outputs/mimicgen_datagen
  task_name: square
  env_interface_name: MG_Square
  env_interface_type: robosuite
  policy_seed: 0
  success_only: true
  top_k_paths: 30
  min_path_probability: 0.0

  # Square D1 generation params
  action_noise: 0.05
  subtask_term_offset_range: [10, 20]
  nn_k: 3
  interpolate_from_last_target_pose: true
  transform_first_robot_pose: false
  num_interpolation_steps: 5
  num_fixed_steps: 0

  # IC constraints — enabled by failure_targeting arm via cfg_overrides.
  fix_initial_object_poses: false
  object_pose_ranges: null
  subtask_constraints: null

  # ---------------------------------------------------------------------------
  # Failure analysis config (used by MimicgenFailureTargetingArmStep only)
  # ---------------------------------------------------------------------------
  failure_analysis:
    enabled: false              # overridden to true by failure_targeting arm

    # Mode selects which target-collection pipeline to run:
    #   "path_based" (Phase-1 rewrite):
    #     - Enumerate top-K most-probable START→FAILURE paths.
    #     - For each path, find failure trajectories whose run-length-collapsed
    #       cluster sequence matches it; collect those trajectories' sim states
    #       per node along the path.
    #   "prefailure_node" (legacy):
    #     - Pool states from pre-failure graph nodes across all trajectories
    #       (success + failure).
    mode: path_based

    # --- path_based knobs (ignored when mode == prefailure_node) ---
    top_k_paths: 5
    path_min_edge_probability: 0.0
    # Which intermediate node along the path to enforce a subtask constraint at.
    # "closest_to_failure" | "first" | "middle"
    intermediate_heuristic: closest_to_failure
    # Silhouette-score sweep for KMeans k per node.
    kmeans_k_min: 2
    kmeans_k_max: 10

    # --- prefailure_node knobs (ignored when mode == path_based) ---
    value_threshold: 0.0
    min_transition_prob: 0.05
    n_clusters: 5
    targeting_mode: both        # initial_state | intermediate_state | both
    cluster_target_mode: centroid

    # --- shared knobs ---
    budget_per_cluster: 4
    state_schema: null          # null → use DEFAULT_SQUARE_STATE_SCHEMA

    # IC constraint slack
    slack_x: 0.03
    slack_y: 0.03
    slack_z_rot: 0.5

    # Subtask boundary to constrain on (path_based mode → chained_warp_constraint
    # target fires at the END of this subtask). For Square: subtask 0 ends at
    # grasp, subtask 1 ends at placement. Setting to 0 means "force the
    # post-grasp nut pose to lie near the failure-trajectory intermediate cluster
    # centre." null disables the chained-warp constraint entirely.
    subtask_constraint_idx: 0
    subtask_constraint_slack: 1.5
    # Multiplier on per-cluster stddev to derive slack box; widen factor governs
    # graceful degradation on outer retries (currently unused — generator
    # always uses the same slack until budget exhausted).
    slack_alpha: 1.5
    slack_widen_factor: 2.0

# ---------------------------------------------------------------------------
# Steps — full pipeline (no apr23 outputs to skip past on this machine)
# ---------------------------------------------------------------------------
steps:
  - train_baseline
  - eval_policies
  - train_attribution
  - finalize_attribution
  - compute_infembed
  - run_clustering
  - mimicgen_random
  - mimicgen_failure_targeting
  - eval_baseline
