# @package _global_
# E2 Tier 2: reduced-scale agentic run with full downstream pipeline.
# Real Claude tool use; reduced retraining + eval suite. Hours-scale.

defaults:
  - /e2@e2_proposals: defaults
  - _self_

e2_proposals:
  mode: agentic
  conditions: ["A_G", "A_NG"]
  chat_enabled: false
  agentic:
    agent_backend: claude
    agent_backend_params:
      model_name: claude-sonnet-4-6
      max_tokens: 4096
    n_sessions_per_condition: 2
    max_turns: 60
    budget:
      max_tool_calls: 50
      max_visual_calls: 15
      max_video_calls: 2
      max_session_duration_s: 1200
      warning_remaining_threshold: 5
    kinematic_summary_strategy: raw_states
    cache_enabled: true

  # Legacy one-shot path — kept loadable but unused.
  vlm_backend: mock
  vlm_backend_params: null
  vlm_lifecycle: persistent
  n_repetitions: 2
  max_retries: 3
  n_requests_per_type:
    full_trajectory: 4
    recovery: 2
    alternative_strategy: 2

# Eval suite + retraining knobs (consumed by score_adherence_e2 and the
# train/eval pipeline steps once they wire up).
e2_eval:
  n_eval_conditions: 20
  n_retrain_seeds: 2
