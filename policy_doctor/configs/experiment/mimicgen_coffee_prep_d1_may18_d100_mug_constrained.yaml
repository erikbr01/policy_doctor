# @package _global_
# MimicGen budget × replicate sweep — CoffeePreparation D1, May 18 2026, 100-demo baseline,
# mug TIGHTLY constrained initial poses.
#
# Constrain the mug's initial pose relative to the seed demo pose:
#   x:     ±40 mm   (8 cm total range)
#   y:     ±40 mm   (8 cm total range)
#   z_rot: ±30°     (60° total range — vs D1's full 360°)
#
# All other objects (drawer, coffee_machine, coffee_pod): unconstrained (null = D1 range).
#
# Design mirrors the square apr26 d60 nut_constrained_tight experiment.
# Three selection seeds all with fixed seeds (rep_seeds: [1, 2, 3]).
#
# Prerequisite: Phase 0 must generate the D1 pool first:
#   conda run -n mimicgen python scripts/generate_coffee_prep_d1_pool.py \
#     --output_dir data/source/mimicgen/core_datasets/coffee_preparation_d1 \
#     --n_success 300
#
# Usage:
#   python -m policy_doctor.scripts.run_pipeline \
#     data_source=mimicgen_coffee_preparation \
#     +experiment=mimicgen_coffee_prep_d1_may18_d100_mug_constrained \
#     steps=[train_baseline,eval_baseline,compute_policy_embeddings,run_clustering,mimicgen_budget_rep_sweep]
#
# Or via the launch script:
#   ./scripts/run_coffee_prep_d1_may18_sweep.sh

task_config: coffee_prep_d1_may18
experiment_name: mimicgen_coffee_prep_d1_may18_d100_mug_constrained

run_dir: data/pipeline_runs/mimicgen_coffee_prep_d1_may18_seed1_d100_mug_constrained

seeds: [1]
reference_seed: 1

train_date: may18_coffee_prep_d1_d100_mug_constrained
device: cuda:0
project: mimicgen_coffee_preparation
wandb_tags: [coffee_preparation, mimicgen, may18, budget_sweep, rep_sweep, mug_constrained]

baseline:
  max_train_episodes: 100
  checkpoint_topk: 5

evaluation:
  train_date: may18_coffee_prep_d1_d100_mug_constrained
  eval_date: may18_coffee_prep_d1_d100_mug_constrained
  overwrite: false
  num_episodes: 500

attribution:
  train_date: may18_coffee_prep_d1_d100_mug_constrained
  eval_date: may18_coffee_prep_d1_d100_mug_constrained

# Explicit clustering dir (seed 1 result from run_clustering)
clustering_dir: /home/erbauer/refactor_cupid/policy_doctor/third_party/influence_visualizer/configs/coffee_prep_d1_may18/clustering/mimicgen_coffee_prep_d1_may18_d100_mug_constrained_seed1_kmeans_k15
# Point arms to the top-level pipeline run_dir so they can find run_clustering/result.json
clustering_run_dir: data/pipeline_runs/mimicgen_coffee_prep_d1_may18_seed1_d100_mug_constrained

# Clustering — policy embeddings (bottleneck_plan_t0, U-Net mid-block at plan t=0)
clustering_influence_source: policy_emb
clustering_policy_emb_layer: bottleneck_plan_t0
clustering_level: rollout
clustering_demo_split: train
clustering_window_width: 5
clustering_stride: 2
clustering_umap_n_components: 100
clustering_n_clusters: 15
clustering_normalize: none
clustering_aggregation: sum

mimicgen_datagen:
  task_name: coffee_preparation
  env_interface_name: MG_CoffeePreparation
  num_seeds: 10
  output_dir: data/outputs/mimicgen_datagen
  # Pre-prepared source: official D1 with datagen_info added (one-shot prepare_src_dataset).
  # generate_mimicgen_demos falls back to this when select_mimicgen_seed's seed.hdf5
  # lacks datagen_info (needed for seed_object_poses extraction).
  source_dataset_path: data/source/mimicgen/core_datasets/coffee_preparation_d1_prepared/demo.hdf5
  policy_seed: 1
  success_only: true
  top_k_paths: 20
  min_path_probability: 0.0
  # Constrain mug initial pose tightly; leave all other objects unconstrained (null = D1 free range).
  fix_initial_object_poses: true
  object_pose_ranges:
    mug:
      x: [-0.04, 0.04]       # ±40 mm
      y: [-0.04, 0.04]       # ±40 mm
      z_rot: [-0.524, 0.524] # ±30°
    drawer:
      x: null
      y: null
      z_rot: null
    coffee_machine:
      x: null
      y: null
      z_rot: null
    coffee_pod:
      x: null
      y: null
      z_rot: null

# ---------------------------------------------------------------------------
# Rep sweep: three fixed selection seeds (no null/random first phase)
# Devices: 6 concurrent arms split across cuda:0 and cuda:1.
# After ~2.5h kill the cuda:1 slots (GPU 1 reserved for other work).
# ---------------------------------------------------------------------------
mimicgen_budget_rep_sweep:
  heuristics: [random, behavior_graph]
  budgets: [100, 300, 500]
  rep_seeds: [1, 2, 3]
  devices: [cuda:0, cuda:0, cuda:0, cuda:1, cuda:1, cuda:1]

steps: [train_baseline, eval_baseline, compute_policy_embeddings, run_clustering, mimicgen_budget_rep_sweep]
