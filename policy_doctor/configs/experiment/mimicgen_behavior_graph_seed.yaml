# @package _global_
# Behavior-graph seed selection for MimicGen data augmentation.
#
# Comparison experiment: train on 60 demos from Square D1, run eval to collect
# rollouts, use the behavior graph to select the best rollout as MimicGen seed,
# generate 200 demos, then retrain on 60 + 200 = 260 demos.
#
# Compare success rate against the random-seed baseline (mimicgen_random_seed.yaml).
#
# Run the orchestrator in the mimicgen_torch2 env (needed for eval_policies,
# compute_infembed, and train_on_combined_data which all execute in-process):
#
#   conda run -n mimicgen_torch2 python -m policy_doctor.scripts.run_pipeline \
#     +experiment=mimicgen_behavior_graph_seed \
#     steps=[train_baseline,eval_policies,train_attribution,finalize_attribution,\
#            compute_infembed,run_clustering,select_mimicgen_seed_from_graph,\
#            generate_mimicgen_demos,train_on_combined_data]

defaults:
  - override /data_source: mimicgen_square

task_config: square_mh_apr23_mimicgen_pipeline
experiment_name: mimicgen_behavior_graph_seed
seeds: [0]

train_date: apr23_d1_60
device: "cuda:0"
project: influence-clustering
wandb_tags: [square_mimicgen, behavior_graph_seed, d1_60demo]

# Baseline: train on first 60 demos of the D1 dataset.
# max_train_episodes: 60 caps the dataset to the first 60 episodes.
baseline:
  task: square_mh_mimicgen
  policy: diffusion_unet_lowdim
  config_dir: configs/low_dim/square_mimicgen_lowdim/diffusion_policy_cnn
  config_name: config.yaml
  seeds: [0]
  num_epochs: 1751
  checkpoint_topk: 3
  checkpoint_every: 50
  max_train_episodes: 60
  val_ratio: 0.04
  output_dir: data/outputs/train
  project: influence-clustering
  num_gpus: 1
  tf32: true
  compile: true

evaluation:
  task: square_mh_mimicgen
  policy: diffusion_unet_lowdim
  train_date: apr23_d1_60
  eval_date: apr23_d1_60
  train_ckpt: latest
  num_episodes: 100
  test_start_seed: 100000
  eval_output_dir: data/outputs/eval_save_episodes
  train_output_dir: data/outputs/train

# Attribution / clustering (for behavior graph)
attribution:
  train_date: apr23_d1_60
  eval_date: apr23_d1_60
  task: square_mh_mimicgen
  policy: diffusion_unet_lowdim
  state: low_dim

clustering_influence_source: infembed
clustering_level: rollout
clustering_demo_split: train
clustering_window_width: 5
clustering_stride: 2
clustering_umap_n_components: 100
clustering_n_clusters: 15
clustering_normalize: none
clustering_aggregation: sum

# Advantage (behavior graph)
advantage_gamma: 0.99
advantage_reward_success: 1.0
advantage_reward_failure: -1.0
advantage_reward_end: 0.0

# MimicGen generation config
mimicgen_datagen:
  # Seed selection (behavior graph)
  top_k_paths: 5
  min_path_probability: 0.0
  success_only: true
  policy_seed: 0

  # Generation: 200 trials (expect ~70-90% success rate for D0-style fixed poses)
  num_trials: 200
  output_dir: data/outputs/mimicgen_datagen
  task_name: square
  env_interface_name: MG_Square
  env_interface_type: robosuite

  # Variance: conservative (close to seed trajectory)
  action_noise: 0.05
  subtask_term_offset_range: [0, 10]
  nn_k: 1
  interpolate_from_last_target_pose: false
  transform_first_robot_pose: false
  num_interpolation_steps: 5
  num_fixed_steps: 0

  # Pose constraints: fix to seed demo pose (D0-style)
  fix_initial_object_poses: true
  object_pose_ranges:
    SquareNut:
      x: [-0.05, 0.05]
      y: [-0.05, 0.05]
      z_rot: [-0.5, 0.5]

  # Dataset for combining: the 60-demo original subset
  original_dataset_path: data/mimicgen/square_d1_60.hdf5
  # combined_train_date: overrides the auto-generated name for combined training runs
  combined_train_date: apr23_d1_60_combined_graph
