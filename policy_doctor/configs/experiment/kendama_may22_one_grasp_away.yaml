# @package _global_
# Baseline training for kendama task: "one grasp - away from box".
# Combines may13+may19+may20 baseline data with new may21+may22 demos for this
# language instruction only.
#
# Episode counts in success/{2026-05-21,2026-05-22} for this instruction:
#   "kendama - one grasp - away from box"  ->  57 episodes
#   (plus 3 likely-typo variants: "turned right"=2, "turned away"=1; ignored
#   unless you decide to fold them in.)
# Target was 50 — we have 57+ to choose from.
#
# Prerequisites (NOT YET EXECUTED — conversion paused pending the 48-episode decision):
#   1. Convert may21+may22 success data, filtering on attrs['current_task']:
#        LD_LIBRARY_PATH=~/zed_sdk_extracted/lib:~/nvidia_decode_extra/usr/lib/x86_64-linux-gnu \
#        conda run -n policy_doctor python scripts/convert_droid_hdf5_debug.py \
#            --input_path <staged-dir-with-only-this-instruction's-episodes> \
#            --output_path ~/data/droid_data/kendama_may22_one_grasp_away_raw.hdf5 \
#            --image_size 256 256 --num_workers 12
#
#   2. Merge with the existing baseline:
#        conda run -n policy_doctor python scripts/merge_droid_hdf5.py \
#            --inputs ~/data/droid_data/kendama_may13_may20.hdf5 \
#                     ~/data/droid_data/kendama_may22_one_grasp_away_raw.hdf5 \
#            --output ~/data/droid_data/kendama_may13_may22_one_grasp_away.hdf5
#
# Usage:
#   python -m policy_doctor.scripts.run_pipeline \
#     data_source=droid_hdf5 \
#     +experiment=kendama_may22_one_grasp_away \
#     steps=[train_baseline]

experiment_name: kendama_may22_one_grasp_away
seeds: [0]

baseline:
  train_date: may22_one_grasp_away
  diffusion_compose_overrides:
    - "+task.dataset.dataset_mask_kwargs.max_val_episodes=1"
    - "training.resume=false"
    - "logging.resume=false"
    - "logging.id=null"
  num_epochs: 1000
  checkpoint_every: 50
  checkpoint_topk: 3
  val_ratio: 0.1
  tf32: true
  compile: true
  diffusion_dataset_path: /home/erbauer/data/droid_data/kendama_may13_may22_one_grasp_away.hdf5

device: "cuda:0"
project: kendama-droid
wandb_tags: [droid, kendama, baseline, may22, one_grasp, away_from_box]
