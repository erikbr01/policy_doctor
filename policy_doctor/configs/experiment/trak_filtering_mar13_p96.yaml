# @package _global_
# TRAK-based curation-filtering for transport_mh_jan28, 96th percentile (~44% filtered).
#
# Usage: python -m policy_doctor.scripts.run_pipeline +experiment=trak_filtering_mar13_p96 steps=[run_clustering,run_curation_config,train_curated,eval_curated]

task_config: transport_mh_jan28
experiment_name: trak_filtering_mar13_p96
seeds: [0, 1, 2]

clustering_influence_source: trak
clustering_level: rollout
clustering_demo_split: train
clustering_window_width: 5
clustering_stride: 2
clustering_umap_n_components: 100
clustering_n_clusters: 20
clustering_normalize: none
clustering_aggregation: sum

advantage_gamma: 0.99
advantage_reward_success: 1.0
advantage_reward_failure: -1.0
advantage_reward_end: 0.0

curation_mode: filter
advantage_threshold: -0.3
selection_percentile: 96
window_width: 5
aggregation_method: mean
curation_output_name: trak_filtering_mar13_p96

device: "cuda:1"
project: cupid
