# Pygame controller intervention (Xbox / DualSense via SDL)
# Usage: python scripts/run_dagger.py ... dagger_config=pygame_default
# Requires: pip install pygame

device: pygame

pygame:
  controller_index: 0
  deadzone: 0.15
  scale_position: 0.06    # 3× vs prior 0.02 calibration gain
  scale_rotation: 0.06
  # Layout labels startup hints only when button_* below are set (driver-specific indices win).
  controller_layout: ps4

  axis_left_x: 0
  axis_left_y: 1
  axis_right_x: 2
  axis_right_y: 3
  axis_left_trigger: 4
  axis_right_trigger: 5

  # Calibrated raw indices (run scripts/experiments/calibrate_pygame_controller.py on other machines).
  button_gripper_close: 9
  button_gripper_open: 10
  button_reset: 8
  button_toggle: 6

intervention:
  rule: node_value_threshold
  node_value_threshold: 0.0

visualization:
  enabled: true
  camera_names: ["agentview", "robot0_eye_in_hand"]

recording:
  enabled: false
  save_format: hdf5
