task: transport_mh
state: low_dim
method: diffusion_policy_cnn
policy: diffusion_unet_lowdim

train_date: jan28
eval_date: jan28
train_ckpt: latest
eval_ckpt: latest
eval_as_train_seed: true

train_output_dir: data/outputs/train
eval_output_dir: data/outputs/eval_save_episodes

model_keys: "model."
modelout_fn: DiffusionLowdimFunctionalModelOutput
gradient_co: DiffusionLowdimFunctionalGradientComputer
proj_dim: 4000
proj_max_batch_size: 32
lambda_reg: 0.0
use_half_precision: false
batch_size: 64
loss_fn: square
num_timesteps: 64
featurize_holdout: true
finalize_scores: true
device: cuda:0
seed: 0

num_ckpts: 1
finalize_on_train: true

result_date: default
eval_online_trak_influence: true
eval_offline_policy_loss: false
eval_offline_action_diversity: false
eval_offline_state_diversity: false
eval_online_state_similarity: false
eval_online_demo_score: false
compute_holdout: true
overwrite: false

# InfEmbed-specific
infembed_batch_size: 128
projection_dim: 100
arnoldi_dim: 200

# Acceleration flags
tf32: true
compile: true

# InfEmbed-specific predict acceleration knobs (compute_infembed step).
# Defaults are the fastest known config for the lowdim diffusion U-Net (~1.1M
# params), measured at ~3x speedup on the predict path vs the historical
# eager + projection_on_cpu setting.  For image policies (large obs_encoder),
# set projection_on_gpu=false if R+policy together OOM the GPU.
#
#   compile_target: which submodule to wrap with torch.compile when
#       attribution.compile=true.  'inner_unet' (default) wraps only
#       policy.model — embeddings stay bit-equivalent to eager up to fp32
#       reductions.  'wrapper' wraps DiffusionLossWrapper (broader); not
#       recommended — no measured speedup and trips dynamo on einops +
#       nn.ParameterDict.
#   projection_on_gpu: whether the Arnoldi projection vectors (fit_results.R)
#       live on GPU during predict.  GPU avoids ~projection_dim small CPU->GPU
#       transfers per batch.  Memory cost ~projection_dim * sum(param_size).
compile_target: inner_unet
projection_on_gpu: true
