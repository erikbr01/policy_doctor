task: square_mh_mimicgen
state: low_dim
method: diffusion_policy_cnn
policy: diffusion_unet_lowdim

train_date: jan18
eval_date: jan18
train_ckpt: latest
eval_ckpt: latest
eval_as_train_seed: true

train_output_dir: data/outputs/train
eval_output_dir: data/outputs/eval_save_episodes

model_keys: "model."
modelout_fn: DiffusionLowdimFunctionalModelOutput
gradient_co: DiffusionLowdimFunctionalGradientComputer
proj_dim: 4000
proj_max_batch_size: 32
lambda_reg: 0.0
use_half_precision: false
batch_size: 128
loss_fn: square
num_timesteps: 64
featurize_holdout: true
finalize_scores: true
device: cuda:0
seed: 0

num_ckpts: 1
finalize_on_train: true

result_date: default
eval_online_trak_influence: true
eval_offline_policy_loss: false
eval_offline_action_diversity: false
eval_offline_state_diversity: false
eval_online_state_similarity: false
eval_online_demo_score: false
compute_holdout: true
overwrite: false

# Optional: explicit HDF5 path for attribution when the checkpoint's stored path is stale
# (machine migration, renamed directory, or different MimicGen generation run).
# null = auto-resolve from checkpoint config + fallback search under repo_root.
# Use the merged dataset for attribution (same split behaviour as training):
#   dataset_path: data/mimicgen/square_merged.hdf5
# Use a specific D1 core dataset instead:
#   dataset_path: data/source/mimicgen/core_datasets/NutAssemblySquare/demo_src_NutAssemblySquare_task_D1/demo.hdf5
dataset_path: null
