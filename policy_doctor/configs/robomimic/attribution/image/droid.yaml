# Attribution config for DROID image policy.
# NOTE: image attribution (TRAK/InfEmbed on image policies) is significantly more
# expensive than low-dim. projection_on_gpu=false is recommended to avoid OOM.
# For fast iteration, run clustering on the state embeddings only (skip image keys).
task: droid
state: image
method: diffusion_policy_cnn
policy: diffusion_unet_hybrid_image

train_date: null
eval_date: null
train_ckpt: latest
eval_ckpt: latest
eval_as_train_seed: true

train_output_dir: data/outputs/train
eval_output_dir: data/outputs/eval_save_episodes

model_keys: "model."
modelout_fn: DiffusionLowdimFunctionalModelOutput
gradient_co: DiffusionLowdimFunctionalGradientComputer
proj_dim: 4000
proj_max_batch_size: 16
lambda_reg: 0.0
use_half_precision: false
batch_size: 64
loss_fn: square
num_timesteps: 64
featurize_holdout: true
finalize_scores: true
device: cuda:0
seed: 0

num_ckpts: 1
finalize_on_train: true

result_date: default
eval_online_trak_influence: true
eval_offline_policy_loss: false
eval_offline_action_diversity: false
eval_offline_state_diversity: false
eval_online_state_similarity: false
eval_online_demo_score: false
compute_holdout: true
overwrite: false

dataset_path: null

tf32: true
compile: false
compile_target: inner_unet
projection_on_gpu: false  # image encoder is large; keep projection on CPU
