  # pi0.5-LIBERO: policy_emb + state/state_action (no trak/infembed)
  # agg_first only — per-timestep UMAP on (~140k, 1024) wedges in optimization
  - task: pi05_libero_spatial
    eval_dir: data/pi05_libero/libero_spatial
    run_dir: data/demo_sweep/pi05_libero_spatial
    orderings: [agg_first]
    reps:
      - id: policy_emb_bottleneck_plan_t0
        representation: policy_emb
        layer: pi05
      - id: state_full_history
        representation: state
        obs_strategy: full_history
      - id: state_action_full_history_full_plan
        representation: state_action
        obs_strategy: full_history
        action_strategy: full_plan
