# @package _global_
# Comparison: Apr26 sweep, 60 source demos, seed 1 — full budget sweep.
#
# Pools rep1 + rep2 within each group. Covers budgets 20/100/500/1000.
# Each group = one heuristic × all budgets × both reps → tests the aggregate
# question "does heuristic X outperform Y when we use all available generation budget?"
#
# For budget-specific comparisons use mimicgen_apr26_demos60_seed1_budget_sweep.yaml.
#
# Usage:
#   python -m policy_doctor.scripts.compare_policies comparison=mimicgen_apr26_demos60_seed1

comparison:
  title: "MimicGen Apr26 — 60 demos, seed 1 (all budgets, rep1+rep2)"
  eval_output_dir: data/outputs/eval_save_episodes
  output_dir: data/outputs/comparisons/mimicgen_apr26_demos60_seed1
  global_confidence_level: 0.95
  max_sample_size_per_policy: null
  top_k_checkpoints: 5
  shuffle: true

  groups:
    - label: Behavior Graph
      run_names:
        - apr26_sweep_demos60_train_diffusion_unet_lowdim_square_mh_mimicgen_1-mimicgen_combined-behavior_graph-budget20
        - apr26_sweep_demos60_train_diffusion_unet_lowdim_square_mh_mimicgen_1-mimicgen_combined-behavior_graph-budget20-rep1
        - apr26_sweep_demos60_train_diffusion_unet_lowdim_square_mh_mimicgen_1-mimicgen_combined-behavior_graph-budget20-rep2
        - apr26_sweep_demos60_train_diffusion_unet_lowdim_square_mh_mimicgen_1-mimicgen_combined-behavior_graph-budget100
        - apr26_sweep_demos60_train_diffusion_unet_lowdim_square_mh_mimicgen_1-mimicgen_combined-behavior_graph-budget100-rep1
        - apr26_sweep_demos60_train_diffusion_unet_lowdim_square_mh_mimicgen_1-mimicgen_combined-behavior_graph-budget100-rep2
        - apr26_sweep_demos60_train_diffusion_unet_lowdim_square_mh_mimicgen_1-mimicgen_combined-behavior_graph-budget500
        - apr26_sweep_demos60_train_diffusion_unet_lowdim_square_mh_mimicgen_1-mimicgen_combined-behavior_graph-budget500-rep1
        - apr26_sweep_demos60_train_diffusion_unet_lowdim_square_mh_mimicgen_1-mimicgen_combined-behavior_graph-budget500-rep2
        - apr26_sweep_demos60_train_diffusion_unet_lowdim_square_mh_mimicgen_1-mimicgen_combined-behavior_graph-budget1000
        - apr26_sweep_demos60_train_diffusion_unet_lowdim_square_mh_mimicgen_1-mimicgen_combined-behavior_graph-budget1000-rep1
        - apr26_sweep_demos60_train_diffusion_unet_lowdim_square_mh_mimicgen_1-mimicgen_combined-behavior_graph-budget1000-rep2

    - label: Diversity
      run_names:
        - apr26_sweep_demos60_train_diffusion_unet_lowdim_square_mh_mimicgen_1-mimicgen_combined-diversity-budget20
        - apr26_sweep_demos60_train_diffusion_unet_lowdim_square_mh_mimicgen_1-mimicgen_combined-diversity-budget20-rep1
