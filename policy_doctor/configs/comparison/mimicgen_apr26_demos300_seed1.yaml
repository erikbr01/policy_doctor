# @package _global_
# Comparison: Apr26 sweep, 300 source demos, seed 1 — budget 100 and 500 pooled.
#
# Each group pools rep1 + rep2 (the two variance replicates) across budget100 and budget500.
# Use comparison.groups override on CLI to restrict to a single budget if needed.
#
# Usage:
#   python -m policy_doctor.scripts.compare_policies comparison=mimicgen_apr26_demos300_seed1

comparison:
  title: "MimicGen Apr26 — 300 demos, seed 1 (budget 100+500, rep1+rep2)"
  eval_output_dir: data/outputs/eval_save_episodes
  output_dir: data/outputs/comparisons/mimicgen_apr26_demos300_seed1
  global_confidence_level: 0.95
  max_sample_size_per_policy: null
  top_k_checkpoints: 5
  shuffle: true

  groups:
    - label: Behavior Graph
      run_names:
        # budget 100
        - apr26_sweep_demos300_train_diffusion_unet_lowdim_square_mh_mimicgen_1-mimicgen_combined-behavior_graph-budget100
        - apr26_sweep_demos300_train_diffusion_unet_lowdim_square_mh_mimicgen_1-mimicgen_combined-behavior_graph-budget100-rep1
        - apr26_sweep_demos300_train_diffusion_unet_lowdim_square_mh_mimicgen_1-mimicgen_combined-behavior_graph-budget100-rep2
        # budget 500
        - apr26_sweep_demos300_train_diffusion_unet_lowdim_square_mh_mimicgen_1-mimicgen_combined-behavior_graph-budget500
        - apr26_sweep_demos300_train_diffusion_unet_lowdim_square_mh_mimicgen_1-mimicgen_combined-behavior_graph-budget500-rep1
        - apr26_sweep_demos300_train_diffusion_unet_lowdim_square_mh_mimicgen_1-mimicgen_combined-behavior_graph-budget500-rep2

    - label: Diversity
      run_names:
        - apr26_sweep_demos300_train_diffusion_unet_lowdim_square_mh_mimicgen_1-mimicgen_combined-diversity-budget100
        - apr26_sweep_demos300_train_diffusion_unet_lowdim_square_mh_mimicgen_1-mimicgen_combined-diversity-budget100-rep1
        - apr26_sweep_demos300_train_diffusion_unet_lowdim_square_mh_mimicgen_1-mimicgen_combined-diversity-budget100-rep2
        - apr26_sweep_demos300_train_diffusion_unet_lowdim_square_mh_mimicgen_1-mimicgen_combined-diversity-budget500
        - apr26_sweep_demos300_train_diffusion_unet_lowdim_square_mh_mimicgen_1-mimicgen_combined-diversity-budget500-rep1
        - apr26_sweep_demos300_train_diffusion_unet_lowdim_square_mh_mimicgen_1-mimicgen_combined-diversity-budget500-rep2

    - label: Random
      run_names:
        - apr26_sweep_demos300_train_diffusion_unet_lowdim_square_mh_mimicgen_1-mimicgen_combined-random-budget100
        - apr26_sweep_demos300_train_diffusion_unet_lowdim_square_mh_mimicgen_1-mimicgen_combined-random-budget100-rep1
        - apr26_sweep_demos300_train_diffusion_unet_lowdim_square_mh_mimicgen_1-mimicgen_combined-random-budget100-rep2
        - apr26_sweep_demos300_train_diffusion_unet_lowdim_square_mh_mimicgen_1-mimicgen_combined-random-budget500
        - apr26_sweep_demos300_train_diffusion_unet_lowdim_square_mh_mimicgen_1-mimicgen_combined-random-budget500-rep1
        - apr26_sweep_demos300_train_diffusion_unet_lowdim_square_mh_mimicgen_1-mimicgen_combined-random-budget500-rep2
