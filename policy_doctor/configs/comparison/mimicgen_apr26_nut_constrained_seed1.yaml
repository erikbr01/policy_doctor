        - apr26_sweep_demos60_nut_constrained_train_diffusion_unet_lowdim_square_mh_mimicgen_1-mimicgen_combined-random-budget100-rep1
        - apr26_sweep_demos60_nut_constrained_train_diffusion_unet_lowdim_square_mh_mimicgen_1-mimicgen_combined-random-budget100-rep2
        - apr26_sweep_demos60_nut_constrained_tight_train_diffusion_unet_lowdim_square_mh_mimicgen_1-mimicgen_combined-random-budget100
        - apr26_sweep_demos60_nut_constrained_tight_train_diffusion_unet_lowdim_square_mh_mimicgen_1-mimicgen_combined-random-budget100-rep1
        - apr26_sweep_demos60_nut_constrained_tight_train_diffusion_unet_lowdim_square_mh_mimicgen_1-mimicgen_combined-random-budget100-rep2
        - apr26_sweep_demos300_nut_constrained_train_diffusion_unet_lowdim_square_mh_mimicgen_1-mimicgen_combined-random-budget300
        - apr26_sweep_demos300_nut_constrained_train_diffusion_unet_lowdim_square_mh_mimicgen_1-mimicgen_combined-random-budget300-rep1
        - apr26_sweep_demos300_nut_constrained_train_diffusion_unet_lowdim_square_mh_mimicgen_1-mimicgen_combined-random-budget300-rep2
        - apr26_sweep_demos300_nut_constrained_train_diffusion_unet_lowdim_square_mh_mimicgen_1-mimicgen_combined-random-budget1000
        - apr26_sweep_demos300_nut_constrained_train_diffusion_unet_lowdim_square_mh_mimicgen_1-mimicgen_combined-random-budget1000-rep1
        - apr26_sweep_demos300_nut_constrained_train_diffusion_unet_lowdim_square_mh_mimicgen_1-mimicgen_combined-random-budget1000-rep2
