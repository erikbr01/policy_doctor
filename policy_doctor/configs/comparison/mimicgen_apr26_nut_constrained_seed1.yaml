# @package _global_
# Comparison: Apr26 sweep, nut-constrained pose variant, seed 1.
#
# Covers both constraint tightness levels (nut_constrained and nut_constrained_tight)
# × budgets (100, 300, 1000) × reps, pooled within each heuristic group.
#
# Usage:
#   python -m policy_doctor.scripts.compare_policies comparison=mimicgen_apr26_nut_constrained_seed1

comparison:
  title: "MimicGen Apr26 — nut-constrained, seed 1 (loose+tight, all budgets)"
  eval_output_dir: data/outputs/eval_save_episodes
  output_dir: data/outputs/comparisons/mimicgen_apr26_nut_constrained_seed1
  global_confidence_level: 0.95
  max_sample_size_per_policy: null
  top_k_checkpoints: 5
  shuffle: true

  groups:
    - label: Behavior Graph
      run_names:
        # demos60 nut_constrained (loose), budget100
        - apr26_sweep_demos60_nut_constrained_train_diffusion_unet_lowdim_square_mh_mimicgen_1-mimicgen_combined-behavior_graph-budget100
        - apr26_sweep_demos60_nut_constrained_train_diffusion_unet_lowdim_square_mh_mimicgen_1-mimicgen_combined-behavior_graph-budget100-rep1
        - apr26_sweep_demos60_nut_constrained_train_diffusion_unet_lowdim_square_mh_mimicgen_1-mimicgen_combined-behavior_graph-budget100-rep2
        # demos60 nut_constrained_tight, budget100
        - apr26_sweep_demos60_nut_constrained_tight_train_diffusion_unet_lowdim_square_mh_mimicgen_1-mimicgen_combined-behavior_graph-budget100
        - apr26_sweep_demos60_nut_constrained_tight_train_diffusion_unet_lowdim_square_mh_mimicgen_1-mimicgen_combined-behavior_graph-budget100-rep1
        - apr26_sweep_demos60_nut_constrained_tight_train_diffusion_unet_lowdim_square_mh_mimicgen_1-mimicgen_combined-behavior_graph-budget100-rep2
        # demos300 nut_constrained (loose), budget300 + budget1000
        - apr26_sweep_demos300_nut_constrained_train_diffusion_unet_lowdim_square_mh_mimicgen_1-mimicgen_combined-behavior_graph-budget300
        - apr26_sweep_demos300_nut_constrained_train_diffusion_unet_lowdim_square_mh_mimicgen_1-mimicgen_combined-behavior_graph-budget300-rep1
        - apr26_sweep_demos300_nut_constrained_train_diffusion_unet_lowdim_square_mh_mimicgen_1-mimicgen_combined-behavior_graph-budget300-rep2
        - apr26_sweep_demos300_nut_constrained_train_diffusion_unet_lowdim_square_mh_mimicgen_1-mimicgen_combined-behavior_graph-budget1000
        - apr26_sweep_demos300_nut_constrained_train_diffusion_unet_lowdim_square_mh_mimicgen_1-mimicgen_combined-behavior_graph-budget1000-rep1
        - apr26_sweep_demos300_nut_constrained_train_diffusion_unet_lowdim_square_mh_mimicgen_1-mimicgen_combined-behavior_graph-budget1000-rep2

    - label: Diversity
      run_names:
        - apr26_sweep_demos60_nut_constrained_train_diffusion_unet_lowdim_square_mh_mimicgen_1-mimicgen_combined-diversity-budget100
        - apr26_sweep_demos60_nut_constrained_train_diffusion_unet_lowdim_square_mh_mimicgen_1-mimicgen_combined-diversity-budget100-rep1
        - apr26_sweep_demos60_nut_constrained_train_diffusion_unet_lowdim_square_mh_mimicgen_1-mimicgen_combined-diversity-budget100-rep2
        - apr26_sweep_demos60_nut_constrained_tight_train_diffusion_unet_lowdim_square_mh_mimicgen_1-mimicgen_combined-diversity-budget100
        - apr26_sweep_demos60_nut_constrained_tight_train_diffusion_unet_lowdim_square_mh_mimicgen_1-mimicgen_combined-diversity-budget100-rep1
        - apr26_sweep_demos60_nut_constrained_tight_train_diffusion_unet_lowdim_square_mh_mimicgen_1-mimicgen_combined-diversity-budget100-rep2
        - apr26_sweep_demos300_nut_constrained_train_diffusion_unet_lowdim_square_mh_mimicgen_1-mimicgen_combined-diversity-budget300
        - apr26_sweep_demos300_nut_constrained_train_diffusion_unet_lowdim_square_mh_mimicgen_1-mimicgen_combined-diversity-budget300-rep1
        - apr26_sweep_demos300_nut_constrained_train_diffusion_unet_lowdim_square_mh_mimicgen_1-mimicgen_combined-diversity-budget300-rep2
        - apr26_sweep_demos300_nut_constrained_train_diffusion_unet_lowdim_square_mh_mimicgen_1-mimicgen_combined-diversity-budget1000
        - apr26_sweep_demos300_nut_constrained_train_diffusion_unet_lowdim_square_mh_mimicgen_1-mimicgen_combined-diversity-budget1000-rep1
        - apr26_sweep_demos300_nut_constrained_train_diffusion_unet_lowdim_square_mh_mimicgen_1-mimicgen_combined-diversity-budget1000-rep2

    - label: Random
      run_names:
