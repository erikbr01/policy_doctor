# @package _global_
# Comparison: Apr26 nut-constrained pose variants — all seeds, both tightness levels,
# all demos/budget combinations.
#
# Structure per heuristic group:
#   - demos60 nut_constrained (loose): budget100, seeds 0/1/2, rep1+rep2 on seed 1
#   - demos60 nut_constrained_tight:   budget100, seeds 0/1/2, rep1+rep2 on seed 1
#   - demos60 budget300 nut_constrained (loose): budget300, seeds 0/1/2, rep1+rep2
#   - demos60 budget300 nut_constrained_tight:   budget300, seeds 0/1/2, rep1+rep2 (partial)
#   - demos300 nut_constrained (loose): budget300+budget1000, seed 1 + rep1+rep2
#
# Seed 1 evals are complete; seeds 0 and 2 will be picked up automatically as they land
# (missing dirs emit a warning and are skipped without failing the comparison).
# The base run for each condition has no rep suffix; rep1 and rep2 are variance replicates.
#
# Usage:
#   python -m policy_doctor.scripts.compare_policies comparison=mimicgen_apr26_nut_constrained

comparison:
  title: "MimicGen Apr26 — nut-constrained (all seeds, loose+tight, all budgets)"
  eval_output_dir: data/outputs/eval_save_episodes
  output_dir: data/outputs/comparisons/mimicgen_apr26_nut_constrained
  global_confidence_level: 0.95
  max_sample_size_per_policy: null
  top_k_checkpoints: 5
  shuffle: true

  groups:
    - label: Behavior Graph
      run_names:
        # ── demos60 nut_constrained (loose), budget100 ──
        # seed 0 (eval pending)
        - apr26_sweep_demos60_nut_constrained_train_diffusion_unet_lowdim_square_mh_mimicgen_0-mimicgen_combined-behavior_graph-budget100
        # seed 1: base + rep1 + rep2
