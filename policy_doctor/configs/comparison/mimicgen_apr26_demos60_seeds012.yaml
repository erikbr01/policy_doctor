  title: "MimicGen Apr26 — 60 demos, seeds 0+1+2 (all budgets)"
  eval_output_dir: data/outputs/eval_save_episodes
  output_dir: data/outputs/comparisons/mimicgen_apr26_demos60_seeds012
  global_confidence_level: 0.95
  max_sample_size_per_policy: null
  top_k_checkpoints: 5
  shuffle: true

  groups:
    - label: Behavior Graph
      run_names:
        # seed 0
        - apr26_sweep_demos60_train_diffusion_unet_lowdim_square_mh_mimicgen_0-mimicgen_combined-behavior_graph-budget20
