# @package _global_
# Comparison: Apr26 sweep, 60 source demos — seeds 0+1+2 pooled, all budgets.
#
# Groups pool all three policy seeds × all budgets × all reps.
# This is the highest-power comparison across the full demos60 sweep.
# shuffle=true handles the non-i.i.d. concatenation across seeds and budgets.
#
# Usage:
#   python -m policy_doctor.scripts.compare_policies comparison=mimicgen_apr26_demos60_seeds012

