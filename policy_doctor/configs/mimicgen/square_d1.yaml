# @package mimicgen_datagen
# MimicGen Square task — D1 variant.
#
# Placement bounds (from Square_D1._get_initial_placement_bounds):
#   nut:  x ∈ [-0.115, +0.115],  y ∈ [-0.255, +0.255],  z_rot ∈ [0, 2π]
#   peg:  x ∈ [-0.1, +0.3],      y ∈ [-0.2, +0.2],      z_rot = 0 (fixed)
#
# D1 is the full-diversity variant — both nut and peg positions randomise freely.
# MimicGen's object-centric retargeting is designed to handle this. The intent
# here is to generate a diverse dataset covering the full state space, so pose
# constraints are not applied.

task_name: square
env_interface_name: MG_Square
env_interface_type: robosuite
source_dataset_path: data/source/mimicgen/source/square.hdf5
# Use the full 10-demo human source dataset directly (no single-seed materialization).
# MimicGen retargets the D0 human demos into D1's wider nut+peg placement distribution.
# nn_k=3 selects from all 10 source demos per trial for best coverage.
use_full_source_dataset: true

# Trajectory variance knobs — match D0 tight settings
action_noise: 0.05
subtask_term_offset_range: [0, 10]
nn_k: 1                              # pick the single best-matching source demo per trial
interpolate_from_last_target_pose: false
transform_first_robot_pose: false
num_interpolation_steps: 5
num_fixed_steps: 0

# Object pose constraints (offsets from seed demo_0 pose)
# Nut: same ranges as D0 (x=±50mm, y=±200mm, z_rot=±90°)
# Peg: human demos always have peg at (0.230, 0.100); constrain it near there
#      so MimicGen retargeting stays in a regime the source demos can handle.
fix_initial_object_poses: true
object_pose_ranges:
  nut:
    x: [-0.05, 0.05]     # ±50 mm
    y: [-0.2, 0.2]       # ±200 mm around seed y
    z_rot: [-1.57, 1.57] # ±90° around seed rotation
  peg:
    x: [-0.05, 0.05]     # ±50 mm around human demo peg x
    y: [-0.05, 0.05]     # ±50 mm around human demo peg y
    z_rot: [0, 0]        # peg rotation is always 0 in source — pin it
