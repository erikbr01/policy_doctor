# Task-specific config for DAgger / E2 data collection on RoboCasa low-dim layouts.
task: robocasa_layout_lowdim
dataset_path: data/robocasa/datasets/kitchen_lowdim_merged.hdf5

recording:
  obs_keys:
    - object
    - robot0_eef_pos
    - robot0_eef_quat
    - robot0_gripper_qpos

visualization:
  camera_names:
    - agentview
    - robot0_eye_in_hand

pygame:
  spatial_mapping:
    left_stick_xy_mix:
      - [0.0, -1.0]
      - [1.0, 0.0]
  rotation_mapping:
    yaw_source: trigger_diff
    pitch_source: right_stick_x
