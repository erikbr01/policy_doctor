# Task-specific config for DAgger / E2 data collection on RoboMimic square MH.
task: square_mh
dataset_path: data/robomimic/datasets/square/mh/low_dim_abs.hdf5

recording:
  obs_keys:
    - object
    - robot0_eef_pos
    - robot0_eef_quat
    - robot0_gripper_qpos

# Merged into dagger preset when running ``task=square_mh`` / ``viz_server --task square_mh``
# (see ``merge_data_collection_task_into_dagger_cfg``): ``pygame``, ``visualization``.
visualization:
  camera_names:
    - agentview
    - robot0_eye_in_hand

# Gamepad mapping — ``pygame`` block below.
# ``left_stick_xy_mix`` maps [lx, ly] into [arm delta x, arm delta y] (same indices as keyboard A/D and Q/E).
# Tune the 2×2 if stick directions still disagree with the live camera.
pygame:
  spatial_mapping:
    left_stick_xy_mix:
      - [0.0, -1.0]
      - [1.0, 0.0]
  rotation_mapping:
    yaw_source: trigger_diff
    pitch_source: right_stick_x
