# MimicGen square low-dim diffusion — **not** Robomimic: different runner, dataset class, HDF5
# roots, logging, and robosuite env registration (Square_D0 / … via ``import mimicgen``).
#
# Only the U-Net / training hyperparameters are shared (``_shared/diffusion_unet_lowdim_square_arch``).
# There is no ``task=square_lowdim`` or robomimic ``data/robomimic/...`` path here.
defaults:
  - ../../_shared/diffusion_unet_lowdim_square_arch@_here_
  - _self_

# Override obs_dim for MimicGen D1: object key is 17-dim → total obs 26 (vs 23 in standard robomimic square)
obs_dim: 26
# MimicGen square uses delta OSC actions (control_delta=true, 7-DoF), not absolute actions.
# Do NOT apply the axis_angle→rotation_6d transform; actions stay 7-DoF throughout.
action_dim: 7
policy:
  obs_dim: 26
  action_dim: 7
  model:
    global_cond_dim: 52  # obs_dim * n_obs_steps = 26 * 2
    input_dim: 7

exp_name: mimicgen_square_lowdim
logging:
  name: train_diffusion_unet_lowdim_square_mimicgen_lowdim
  tags:
  - train_diffusion_unet_lowdim
  - square_mimicgen_lowdim
  - mimicgen
multi_run:
  run_dir: data/outputs/mimicgen_square_lowdim/train_diffusion_unet_lowdim
  wandb_name_base: mimicgen_square_lowdim_diffusion_unet_lowdim
task:
  abs_action: false
  action_dim: 7
  dataset:
    _target_: diffusion_policy.dataset.mimicgen_replay_lowdim_dataset.MimicgenReplayLowdimDataset
    abs_action: false
    dataset_path: data/source/mimicgen/core_datasets/square/demo_src_square_task_D1/demo.hdf5
    horizon: 16
    max_train_episodes: null
    obs_keys:
    - object
    - robot0_eef_pos
    - robot0_eef_quat
    - robot0_gripper_qpos
    pad_after: 7
    pad_before: 1
    seed: 42
    use_legacy_normalizer: false
    val_ratio: 0.02
  dataset_path: data/mimicgen/square_merged.hdf5
  dataset_type: ph
  env_runner:
    _target_: diffusion_policy.env_runner.mimicgen_lowdim_runner.MimicgenLowdimRunner
    abs_action: false
    crf: 22
    dataset_path: data/source/mimicgen/core_datasets/square/demo_src_square_task_D1/demo.hdf5
    fps: 10
    max_steps: 500
    n_action_steps: 8
    n_envs: 28
    n_latency_steps: 0
    n_obs_steps: 2
    n_test: 50
    n_test_vis: 4
    n_train: 6
    n_train_vis: 2
    obs_keys:
    - object
    - robot0_eef_pos
    - robot0_eef_quat
    - robot0_gripper_qpos
    past_action: false
    render_hw:
    - 128
    - 128
    test_start_seed: 100000
    train_start_idx: 0
  keypoint_dim: 3
  name: square_mimicgen_lowdim
  obs_dim: 26  # MimicGen D1 object key is 17-dim (vs 14 in standard robomimic square) → 17+3+4+2=26
  obs_keys:
  - object
  - robot0_eef_pos
  - robot0_eef_quat
  - robot0_gripper_qpos
  task_name: square_mimicgen
task_name: square_mimicgen_lowdim
