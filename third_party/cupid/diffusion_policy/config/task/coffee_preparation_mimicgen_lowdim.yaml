# CoffeePreparation D1 — standalone task slice for MimicgenLowdimRunner.
#
# obs_dim: 95 = object(86) + eef_pos(3) + eef_quat(4) + gripper_qpos(2)
# action_dim: 7 (delta OSC, same as square)

name: coffee_preparation_mimicgen_lowdim

obs_dim: 95
action_dim: 7
keypoint_dim: 3

obs_keys: &obs_keys ['object', 'robot0_eef_pos', 'robot0_eef_quat', 'robot0_gripper_qpos']
task_name: coffee_preparation_mimicgen
dataset_type: ph
dataset_path: &dataset_path data/source/mimicgen/core_datasets/coffee_preparation_d1/demo.hdf5
abs_action: false

env_runner:
  _target_: diffusion_policy.env_runner.mimicgen_lowdim_runner.MimicgenLowdimRunner
  dataset_path: *dataset_path
  obs_keys: *obs_keys
  n_train: 2
  n_train_vis: 0
  train_start_idx: 0
  n_test: 50
  n_test_vis: 0
  test_start_seed: 100000
  max_steps: 800
  n_obs_steps: ${n_obs_steps}
  n_action_steps: ${n_action_steps}
  n_latency_steps: ${n_latency_steps}
  render_hw: [128, 128]
  fps: 10
  crf: 22
  past_action: ${past_action_visible}
  abs_action: false
  n_envs: 10

dataset:
  _target_: diffusion_policy.dataset.mimicgen_replay_lowdim_dataset.MimicgenReplayLowdimDataset
  dataset_path: *dataset_path
  horizon: ${horizon}
  pad_before: ${eval:'${n_obs_steps}-1+${n_latency_steps}'}
  pad_after: ${eval:'${n_action_steps}-1'}
  obs_keys: *obs_keys
  abs_action: false
  use_legacy_normalizer: false
  seed: 42
  val_ratio: 0.02
  max_train_episodes: null
