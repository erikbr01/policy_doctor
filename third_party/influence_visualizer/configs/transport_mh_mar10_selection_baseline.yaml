task: robomimic_transport
name: "Transport MH (Mar10 Selection Baseline)"

# Data paths — reference seed 0; other seeds are derived automatically.
eval_dir: "data/outputs/eval_save_episodes/mar10_selection_baseline/mar10_selection_baseline_train_diffusion_unet_lowdim_transport_mh_0/latest"
train_dir: "data/outputs/train/mar10_selection_baseline/mar10_selection_baseline_train_diffusion_unet_lowdim_transport_mh_0"
train_ckpt: "latest"
exp_date: "default"
seeds: ["0", "1", "2"]
wandb_project: "influence-clustering"
image_dataset_path: "data/robomimic/datasets/transport/mh/image_abs.hdf5"

# Display settings
obs_key: "agentview_image"
top_k: 10
lazy_load_images: true

# Quality tier masks to load from the HDF5 dataset (in priority order)
quality_labels:
  - "better"
  - "okay_better"
  - "okay"
  - "worse_okay"
  - "worse_better"
  - "worse"

# State labels (19D single-timestep observation)
# Order: object(10) + eef_pos(3) + eef_quat(4) + gripper_qpos(2)
state_labels:
  - "obj_pos_x"
  - "obj_pos_y"
  - "obj_pos_z"
  - "obj_quat_x"
  - "obj_quat_y"
  - "obj_quat_z"
  - "obj_quat_w"
  - "obj_7"
  - "obj_8"
  - "obj_9"
  - "eef_pos_x"
  - "eef_pos_y"
  - "eef_pos_z"
  - "eef_quat_x"
  - "eef_quat_y"
  - "eef_quat_z"
  - "eef_quat_w"
  - "gripper_0"
  - "gripper_1"

# Action labels (10D with rotation_6d)
action_labels:
  - "pos_x"
  - "pos_y"
  - "pos_z"
  - "rot_0"
  - "rot_1"
  - "rot_2"
  - "rot_3"
  - "rot_4"
  - "rot_5"
  - "gripper"
